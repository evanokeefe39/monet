name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: vet
        working-directory: go
        run: go vet ./...

      - name: test
        working-directory: go
        run: go test ./...

      - name: build monet-tui
        working-directory: go
        run: go build -ldflags="-s -w" ./cmd/monet-tui/...

      - name: build record-sse
        working-directory: go
        run: go build ./cmd/record-sse/...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: go
          version: latest
