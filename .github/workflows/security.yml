name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly — Mondays 09:00 UTC. Catches CVEs filed after last PR.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group dev
      # pip-audit against the locked dep set so findings tie back to a
      # resolvable commit. `--strict` makes warnings fail the build.
      - run: uv run --with pip-audit pip-audit --strict --disable-pip
