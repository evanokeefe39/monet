services:
  monet:
    build:
      context: ../../..
      dockerfile: examples/deployed/server/Dockerfile
    ports:
      - "2026:2026"
    environment:
      DATABASE_URL: postgresql://monet:monet@postgres:5432/monet
      MONET_API_KEY: ${MONET_API_KEY:?MONET_API_KEY is required}
      MONET_QUEUE_BACKEND: redis
      REDIS_URI: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: aegra serve --host 0.0.0.0 --port 2026

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: monet
      POSTGRES_PASSWORD: monet
      POSTGRES_DB: monet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ../../..
      dockerfile: examples/deployed/worker/Dockerfile
    environment:
      MONET_SERVER_URL: http://monet:2026
      MONET_API_KEY: ${MONET_API_KEY:?MONET_API_KEY is required}
      MONET_QUEUE_BACKEND: redis
      REDIS_URI: redis://redis:6379
      MONET_DISTRIBUTED: "1"
      MONET_WORKER_POOL: ${MONET_WORKER_POOL:-default}
      MONET_WORKER_CONCURRENCY: ${MONET_WORKER_CONCURRENCY:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      monet:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
