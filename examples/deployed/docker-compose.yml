services:
  monet:
    build: ../..
    ports:
      - "2026:2026"
    environment:
      DATABASE_URI: postgresql://monet:monet@postgres:5432/monet
      MONET_API_KEY: ${MONET_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: aegra serve --host 0.0.0.0 --port 2026

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: monet
      POSTGRES_PASSWORD: monet
      POSTGRES_DB: monet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
