repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        exclude: ^(examples/|tests/e2e/|tests/test_subgraph_composition_spike\.py$)
        additional_dependencies:
          - pydantic>=2.0
          - fastapi>=0.115
          - sqlalchemy>=2.0
          - opentelemetry-api>=1.20
          - opentelemetry-sdk>=1.20
          - langgraph>=0.2
          - httpx>=0.27
          - pytest>=8.0
          - click>=8.0
          - uvicorn>=0.30
        args: [--strict, --no-warn-unused-ignores]
