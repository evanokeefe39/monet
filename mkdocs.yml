site_name: monet
site_description: ""
site_url: https://evanokeefe39.github.io/monet/
repo_url: https://github.com/evanokeefe39/monet
repo_name: evanokeefe39/monet

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Defining Agents: guides/agents.md
    - Artifact Store: guides/artifacts.md
    - Orchestration: guides/orchestration.md
    - Distribution Mode: guides/distribution.md
    - Client SDK: guides/client.md
    - Server & Transport: guides/server.md
    - Observability: guides/observability.md
  - API Reference:
    - Core SDK: api/core.md
    - Client: api/client.md
    - Artifacts: api/artifacts.md
    - Queue Providers: api/queue.md
    - Orchestration: api/orchestration.md
    - Descriptors: api/descriptors.md
    - Server: api/server.md
  - Reference:
    - Environment variables: reference/env-vars.md
  - Architecture:
    - Design Principles: architecture/design-principles.md
    - Graph Topology: architecture/graph-topology.md
    - Deployment Scenarios: architecture/deployment-scenarios.md
    - Roadmap: architecture/roadmap.md
